<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="d-flex align-items-center mb-4 gap-2">
      <a routerLink="/clientes" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
      <div>
        <h2 class="fw-bold text-success mb-0">
          <i class="bi bi-person me-2"></i>{{ esEdicion ? 'Editar Cliente' : 'Nuevo Cliente' }}
        </h2>
        
      </div>
    </div>

    <div *ngIf="guardado" class="alert alert-success"><i class="bi bi-check-circle me-2"></i>Guardado correctamente. Redirigiendo...</div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" formControlName="nombre" placeholder="Juan"
                [class.is-invalid]="f['nombre'].invalid && f['nombre'].touched">
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
              <input type="text" class="form-control" formControlName="apellido" placeholder="Pérez"
                [class.is-invalid]="f['apellido'].invalid && f['apellido'].touched">
              <div class="invalid-feedback">El apellido es obligatorio.</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com"
              [class.is-invalid]="f['email'].invalid && f['email'].touched">
            <div class="invalid-feedback">Ingresa un email válido.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="telefono" placeholder="Ej: 70012345"
              [class.is-invalid]="f['telefono'].invalid && f['telefono'].touched">
            <div class="invalid-feedback">Ingresa un teléfono válido (7–15 dígitos).</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Dirección <span class="text-danger">*</span></label>
            <textarea class="form-control" formControlName="direccion" rows="2" placeholder="Calle, ciudad..."
              [class.is-invalid]="f['direccion'].invalid && f['direccion'].touched"></textarea>
            <div class="invalid-feedback">La dirección es obligatoria.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              <i *ngIf="!loading" class="bi bi-save me-1"></i>
              {{ esEdicion ? 'Actualizar' : 'Guardar' }}
            </button>
            <a routerLink="/clientes" class="btn btn-outline-secondary">Cancelar</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
